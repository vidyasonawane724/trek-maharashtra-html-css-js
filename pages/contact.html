<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trek Maharashtra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
<h2>Maharashtra Trek</h2>
<a href="index.html">Home</a>
</nav>

<div class="banner"></div>
<section class="header">
<h1>Contact Maharashtra Trek Team</h1>
</section>

<div class="main-container">

<div class="contact-box">

<div class="form-section">

<div class="form-image">
<img src="https://images.unsplash.com/photo-1593181629936-11c609b8db9b">
</div>
<div class="form-content">

<h2>Send Inquiry</h2>

<form id="contactForm">

<input type="text" id="name" placeholder="Your Name">

<input type="email" id="email" placeholder="Your Email">

<textarea id="message" placeholder="Your Message"></textarea>

<button type="submit" class="submit-btn">Submit Inquiry</button>

</form>
<div class="inquiry-section">

<h2>Submitted Inquiries</h2>

<div id="inquiryList"></div>

<button class="clear-btn" onclick="clearData()">Clear All Data</button>

</div>

</body>
</html>
